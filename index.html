<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/src/assets/SubQuiz-icon-default.png" />
  <title>SubQuiz</title>

  <style>
    quiz-splash-screen {
        background-color: #B9BABB;
        width: 100vw;
        height: 100vh;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: all 0.3s ease;
        opacity: 1;
    }
    quiz-splash-screen > .logo {
        width: 100px;
        height: 100px;
    }

    @media (prefers-color-scheme: dark) {
        quiz-splash-screen {
            background-color: #151517;
        }
    }
    
  </style>
</head>

<body>
  <quiz-splash-screen>
    <img class="logo" src="/src/assets/SubQuiz-icon-default.png" />
  </quiz-splash-screen>
  <quiz-app class="notranslate"/>
  <script type="module" src="/src/main.ts"></script>
  <noscript>
    该网页需要 JavaScript 支持，请启用 JavaScript。
  </noscript>
</body>

</html>
